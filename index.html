<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PlanejaFlow | Finanças Pessoais</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0f1e;
            --card: rgba(20, 25, 45, 0.95);
            --border: rgba(139, 92, 246, 0.2);
            --text: #ffffff;
            --text-sec: #a0aec0;
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1e 0%, #050810 100%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 28px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sec);
            margin-bottom: 32px;
        }

        /* App Container */
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 18px;
        }

        /* Cards */
        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #1a1f3a, #0f1228);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            border-radius: 50%;
        }

        .main-amount {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 12px 0;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Grids */
        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
        }

        .info-item {
            font-size: 0.7rem;
            color: var(--text-sec);
        }

        .info-item b {
            font-size: 1rem;
            display: block;
            margin-top: 4px;
            color: var(--primary);
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card .label {
            font-size: 0.6rem;
            color: var(--text-sec);
        }

        .stat-card .value {
            font-size: 1rem;
            font-weight: 700;
            margin-top: 6px;
            color: var(--primary);
        }

        /* Timeline */
        .timeline-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .timeline-icon {
            width: 40px;
            height: 40px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .timeline-value.positive { color: var(--success); }
        .timeline-value.negative { color: var(--danger); }

        .timeline-details {
            display: flex;
            gap: 12px;
            font-size: 0.7rem;
            color: var(--text-sec);
        }

        /* Form Elements */
        input, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            background: rgba(15, 18, 35, 0.9);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .btn-small {
            width: auto;
            padding: 6px 12px;
            font-size: 0.7rem;
            background: rgba(220, 38, 38, 0.2);
            color: var(--danger);
        }

        /* Nav Bar */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 520px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 12, 25, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 8px 24px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-sec);
            cursor: pointer;
            flex: 1;
        }

        .nav-item i {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-sec);
        }

        /* Transaction List */
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-desc {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .transaction-meta {
            font-size: 0.65rem;
            color: var(--text-sec);
        }

        .transaction-value {
            font-weight: 700;
        }

        .transaction-value.income { color: var(--success); }
        .transaction-value.expense { color: var(--danger); }

        /* Goal Card */
        .goal-card {
            background: rgba(20, 25, 45, 0.7);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            background: rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            text-align: center;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-title">PlanejaFlow</div>
            <div class="login-subtitle">Gerencie suas finanças com inteligência</div>
            <div id="loginError" class="error-message hidden"></div>
            
            <input type="email" id="loginEmail" placeholder="Seu e-mail">
            <input type="password" id="loginPassword" placeholder="Sua senha">
            <button id="btnLogin">Entrar</button>
            
            <div style="text-align: center; margin-top: 16px; font-size: 0.7rem; color: var(--text-sec);">
                <span id="showRegister" style="color: var(--primary); cursor: pointer;">Criar conta</span>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="appScreen" class="hidden">
        <div class="container">
            <div id="tab-home" class="tab-content active"></div>
            <div id="tab-transactions" class="tab-content"></div>
            <div id="tab-goals" class="tab-content"></div>
            <div id="tab-config" class="tab-content"></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i>Início</div>
            <div class="nav-item" onclick="switchTab('transactions')"><i class="fas fa-receipt"></i>Lançamentos</div>
            <div class="nav-item" onclick="switchTab('goals')"><i class="fas fa-flag-checkered"></i>Metas</div>
            <div class="nav-item" onclick="switchTab('config')"><i class="fas fa-sliders-h"></i>Ajustes</div>
        </nav>
    </div>

    <script>
        // ========== SISTEMA DE AUTENTICAÇÃO SIMPLES (localStorage) ==========
        class Auth {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('planejaflow_users') || '{}');
                this.currentUser = null;
            }

            register(email, password) {
                if (!email || !password) return { success: false, error: 'Preencha e-mail e senha' };
                if (password.length < 6) return { success: false, error: 'Senha deve ter no mínimo 6 caracteres' };
                if (this.users[email]) return { success: false, error: 'E-mail já cadastrado' };
                
                this.users[email] = { password: btoa(password), data: this.getDefaultUserData() };
                localStorage.setItem('planejaflow_users', JSON.stringify(this.users));
                return { success: true };
            }

            login(email, password) {
                const user = this.users[email];
                if (!user) return { success: false, error: 'Usuário não encontrado' };
                if (user.password !== btoa(password)) return { success: false, error: 'Senha incorreta' };
                
                this.currentUser = email;
                localStorage.setItem('planejaflow_current_user', email);
                return { success: true, data: user.data };
            }

            logout() {
                this.currentUser = null;
                localStorage.removeItem('planejaflow_current_user');
            }

            getCurrentUser() {
                if (this.currentUser) return this.currentUser;
                const saved = localStorage.getItem('planejaflow_current_user');
                if (saved && this.users[saved]) {
                    this.currentUser = saved;
                    return saved;
                }
                return null;
            }

            getUserData() {
                const email = this.getCurrentUser();
                if (!email) return null;
                return this.users[email]?.data || this.getDefaultUserData();
            }

            saveUserData(data) {
                const email = this.getCurrentUser();
                if (email && this.users[email]) {
                    this.users[email].data = data;
                    localStorage.setItem('planejaflow_users', JSON.stringify(this.users));
                }
            }

            getDefaultUserData() {
                return {
                    name: '',
                    theme: 'dark',
                    transactions: [],
                    goals: [],
                    card1Name: 'Visa Platinum',
                    card2Name: 'Mastercard Black'
                };
            }
        }

        const auth = new Auth();

        // ========== ESTADO DO APP ==========
        let currentTab = 'home';
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let charts = {};

        // ========== FUNÇÕES AUXILIARES ==========
        function getMonthKey() {
            return `${currentYear}-${currentMonth}`;
        }

        function getUserData() {
            const data = auth.getUserData();
            if (!data.transactions) data.transactions = [];
            if (!data.goals) data.goals = [];
            return data;
        }

        function saveUserData(data) {
            auth.saveUserData(data);
        }

        function getMonthTransactions() {
            const data = getUserData();
            const key = getMonthKey();
            if (!data.transactions[key]) data.transactions[key] = [];
            return data.transactions[key];
        }

        function addTransactionToMonth(transaction) {
            const data = getUserData();
            const key = getMonthKey();
            if (!data.transactions[key]) data.transactions[key] = [];
            data.transactions[key].push({ ...transaction, id: Date.now(), date: new Date().toLocaleDateString() });
            saveUserData(data);
            renderAll();
        }

        function deleteTransaction(transactionId) {
            const data = getUserData();
            const key = getMonthKey();
            if (data.transactions[key]) {
                data.transactions[key] = data.transactions[key].filter(t => t.id !== transactionId);
                saveUserData(data);
                renderAll();
            }
        }

        // ========== CÁLCULOS FINANCEIROS ==========
        function calculateBalances() {
            const transactions = getMonthTransactions();
            let moneyBalance = 0, card1Balance = 0, card2Balance = 0;
            
            transactions.forEach(t => {
                const value = t.type === 'income' ? t.value : -t.value;
                if (t.method === 'money') moneyBalance += value;
                else if (t.method === 'card1') card1Balance += value;
                else if (t.method === 'card2') card2Balance += value;
            });
            
            return { moneyBalance, card1Balance, card2Balance };
        }

        function calculateNetWorth() {
            const { moneyBalance, card1Balance, card2Balance } = calculateBalances();
            const debt = (card1Balance < 0 ? Math.abs(card1Balance) : 0) + (card2Balance < 0 ? Math.abs(card2Balance) : 0);
            return moneyBalance - debt;
        }

        function getTopExpenses() {
            const transactions = getMonthTransactions();
            const expenses = transactions.filter(t => t.type === 'expense');
            expenses.sort((a, b) => b.value - a.value);
            return expenses.slice(0, 5);
        }

        function getExpensesByCategory() {
            const transactions = getMonthTransactions();
            const categories = {};
            transactions.forEach(t => {
                if (t.type === 'expense') {
                    categories[t.category] = (categories[t.category] || 0) + t.value;
                }
            });
            return categories;
        }

        // ========== METAS ==========
        function addGoal(name, target, monthly) {
            if (!name || !target || !monthly) return alert('Preencha todos os campos');
            const data = getUserData();
            const currentAmount = 0;
            const monthsNeeded = Math.ceil(target / monthly);
            data.goals.push({
                id: Date.now(),
                name,
                target: parseFloat(target),
                monthly: parseFloat(monthly),
                currentAmount,
                monthsNeeded,
                createdAt: new Date().toISOString()
            });
            saveUserData(data);
            renderAll();
        }

        function updateGoalAmount(goalId, amount) {
            const data = getUserData();
            const goal = data.goals.find(g => g.id === goalId);
            if (goal) {
                goal.currentAmount = (goal.currentAmount || 0) + amount;
                saveUserData(data);
                renderAll();
            }
        }

        function deleteGoal(goalId) {
            const data = getUserData();
            data.goals = data.goals.filter(g => g.id !== goalId);
            saveUserData(data);
            renderAll();
        }

        function calculateGoalProgress(goal) {
            const percent = (goal.currentAmount / goal.target) * 100;
            return Math.min(percent, 100);
        }
                // ========== RENDERIZAÇÃO ==========
        function renderHome() {
            const netWorth = calculateNetWorth();
            const { moneyBalance, card1Balance, card2Balance } = calculateBalances();
            const topExpenses = getTopExpenses();
            const transactions = getMonthTransactions();
            const expensesByCat = getExpensesByCategory();
            const data = getUserData();
            
            let html = `
                <div class="balance-card">
                    <p style="font-size: 0.7rem; opacity: 0.8;">📊 PATRIMÔNIO LÍQUIDO</p>
                    <div class="main-amount">R$ ${netWorth.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
                    <div class="grid-2cols">
                        <div class="info-item">💰 SALDO DISPONÍVEL <b>R$ ${moneyBalance.toFixed(2)}</b></div>
                        <div class="info-item">💳 ${data.card1Name} <b style="color: ${card1Balance < 0 ? '#f87171' : '#4ade80'}">R$ ${Math.abs(card1Balance).toFixed(2)}</b></div>
                        <div class="info-item">💳 ${data.card2Name} <b style="color: ${card2Balance < 0 ? '#f87171' : '#4ade80'}">R$ ${Math.abs(card2Balance).toFixed(2)}</b></div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📝 Novo Lançamento</h3>
                    <div style="display: flex; gap: 12px;">
                        <select id="transType" style="flex: 1;">
                            <option value="income">💰 Entrada</option>
                            <option value="expense">💸 Saída</option>
                        </select>
                        <select id="transMethod" style="flex: 1;">
                            <option value="money">🏦 Dinheiro/Pix</option>
                            <option value="card1">💳 ${data.card1Name}</option>
                            <option value="card2">💳 ${data.card2Name}</option>
                        </select>
                    </div>
                    <input type="text" id="transDesc" placeholder="Descrição">
                    <input type="number" id="transValue" placeholder="Valor (R$)">
                    <input type="text" id="transCategory" placeholder="Categoria (ex: Alimentação, Transporte)">
                    <button onclick="handleAddTransaction()">Salvar Lançamento</button>
                </div>
                
                <div class="card">
                    <h3>🔥 Top 5 Gastos do Mês</h3>
                    ${topExpenses.length === 0 ? '<div class="empty-state">Nenhum gasto registrado</div>' : 
                        topExpenses.map((e, i) => `
                            <div class="timeline-item">
                                <div class="timeline-icon"><i class="fas fa-shopping-cart"></i></div>
                                <div class="timeline-content">
                                    <div class="timeline-header">
                                        <span>${e.description}</span>
                                        <span class="timeline-value negative">-R$ ${e.value.toFixed(2)}</span>
                                    </div>
                                    <div class="timeline-details">${e.category || 'Sem categoria'}</div>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
                
                <div class="card">
                    <h3>📜 Últimas Movimentações</h3>
                    ${transactions.length === 0 ? '<div class="empty-state">Nenhuma movimentação neste mês</div>' :
                        transactions.slice(0, 5).map(t => `
                            <div class="timeline-item">
                                <div class="timeline-icon"><i class="fas ${t.type === 'income' ? 'fa-arrow-up' : 'fa-arrow-down'}"></i></div>
                                <div class="timeline-content">
                                    <div class="timeline-header">
                                        <span>${t.description}</span>
                                        <span class="timeline-value ${t.type === 'income' ? 'positive' : 'negative'}">${t.type === 'income' ? '+' : '-'}R$ ${t.value.toFixed(2)}</span>
                                    </div>
                                    <div class="timeline-details">
                                        <span>${t.category || 'Sem categoria'}</span>
                                        <span>${t.date || new Date().toLocaleDateString()}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
            `;
            
            document.getElementById('tab-home').innerHTML = html;
            
            // Chart de categorias
            if (Object.keys(expensesByCat).length > 0) {
                const ctx = document.createElement('canvas');
                const chartContainer = document.querySelector('#tab-home .card:last-child');
                if (chartContainer && !document.getElementById('categoryChart')) {
                    const chartCard = document.createElement('div');
                    chartCard.className = 'card';
                    chartCard.innerHTML = '<h3>📊 Gastos por Categoria</h3><canvas id="categoryChart"></canvas>';
                    chartContainer.parentNode.insertBefore(chartCard, chartContainer.nextSibling);
                    
                    new Chart(document.getElementById('categoryChart'), {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(expensesByCat),
                            datasets: [{
                                data: Object.values(expensesByCat),
                                backgroundColor: ['#8b5cf6', '#ec489a', '#f59e0b', '#4ade80', '#fbbf24', '#3b82f6']
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
                    });
                }
            }
        }

        function renderTransactions() {
            const transactions = getMonthTransactions();
            const data = getUserData();
            
            let html = `
                <div class="card">
                    <h3>📋 Histórico de Transações</h3>
                    ${transactions.length === 0 ? '<div class="empty-state">Nenhuma transação registrada</div>' :
                        transactions.map(t => `
                            <div class="transaction-item">
                                <div class="transaction-info">
                                    <div class="transaction-desc">${t.description}</div>
                                    <div class="transaction-meta">
                                        ${t.category || 'Sem categoria'} • ${t.method === 'money' ? 'Dinheiro' : t.method === 'card1' ? data.card1Name : data.card2Name} • ${t.date}
                                    </div>
                                </div>
                                <div>
                                    <span class="transaction-value ${t.type === 'income' ? 'income' : 'expense'}">
                                        ${t.type === 'income' ? '+' : '-'} R$ ${t.value.toFixed(2)}
                                    </span>
                                    <button class="btn-small" onclick="deleteTransaction(${t.id})" style="margin-left: 12px;">🗑️</button>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
            `;
            
            document.getElementById('tab-transactions').innerHTML = html;
        }

        function renderGoals() {
            const data = getUserData();
            const goals = data.goals || [];
            
            let html = `
                <div class="card">
                    <h3>🎯 Criar Nova Meta</h3>
                    <input type="text" id="goalName" placeholder="Nome da meta (ex: Comprar Carro)">
                    <input type="number" id="goalTarget" placeholder="Valor necessário (R$)">
                    <input type="number" id="goalMonthly" placeholder="Aporte mensal (R$)">
                    <button onclick="handleAddGoal()">Criar Meta</button>
                </div>
            `;
            
            if (goals.length === 0) {
                html += `<div class="card"><div class="empty-state">Nenhuma meta cadastrada</div></div>`;
            } else {
                goals.forEach(goal => {
                    const progress = calculateGoalProgress(goal);
                    html += `
                        <div class="goal-card">
                            <h3>${goal.name}</h3>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin: 12px 0;">
                                <span>R$ ${goal.currentAmount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                                <span>${progress.toFixed(1)}%</span>
                                <span>R$ ${goal.target.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                            </div>
                            <div style="display: flex; gap: 12px; margin-top: 12px;">
                                <button onclick="handleUpdateGoal(${goal.id})" style="background: rgba(74, 222, 128, 0.2); color: #4ade80;">➕ Adicionar Aporte</button>
                                <button onclick="deleteGoal(${goal.id})" class="btn-small">🗑️ Excluir</button>
                            </div>
                        </div>
                    `;
                });
            }
            
            document.getElementById('tab-goals').innerHTML = html;
        }

        function renderConfig() {
            const data = getUserData();
            
            let html = `
                <div class="card">
                    <h3>⚙️ Configurações</h3>
                    <input type="text" id="userName" placeholder="Seu nome" value="${data.name || ''}">
                    <input type="text" id="card1Name" placeholder="Nome do Cartão 1" value="${data.card1Name}">
                    <input type="text" id="card2Name" placeholder="Nome do Cartão 2" value="${data.card2Name}">
                    <button onclick="saveConfig()">Salvar Configurações</button>
                    <button onclick="handleLogout()" style="margin-top: 16px; background: rgba(220, 38, 38, 0.2); color: #f87171;">Sair da Conta</button>
                </div>
            `;
            
            document.getElementById('tab-config').innerHTML = html;
        }

        function renderAll() {
            if (!auth.getCurrentUser()) return;
            renderHome();
            renderTransactions();
            renderGoals();
            renderConfig();
        }

        // ========== HANDLERS ==========
        function handleAddTransaction() {
            const type = document.getElementById('transType').value;
            const method = document.getElementById('transMethod').value;
            const description = document.getElementById('transDesc').value.trim();
            const value = parseFloat(document.getElementById('transValue').value);
            const category = document.getElementById('transCategory').value.trim();
            
            if (!description || isNaN(value) || value <= 0) {
                alert('Preencha todos os campos corretamente');
                return;
            }
            
            addTransactionToMonth({ type, method, description, value, category: category || 'Outros' });
            
            document.getElementById('transDesc').value = '';
            document.getElementById('transValue').value = '';
            document.getElementById('transCategory').value = '';
        }

        function handleAddGoal() {
            const name = document.getElementById('goalName').value.trim();
            const target = parseFloat(document.getElementById('goalTarget').value);
            const monthly = parseFloat(document.getElementById('goalMonthly').value);
            addGoal(name, target, monthly);
            
            document.getElementById('goalName').value = '';
            document.getElementById('goalTarget').value = '';
            document.getElementById('goalMonthly').value = '';
        }

        function handleUpdateGoal(goalId) {
            const amount = parseFloat(prompt('Quanto você quer adicionar? (R$)', '100'));
            if (!isNaN(amount) && amount > 0) {
                updateGoalAmount(goalId, amount);
            }
        }

        function saveConfig() {
            const data = getUserData();
            data.name = document.getElementById('userName').value;
            data.card1Name = document.getElementById('card1Name').value;
            data.card2Name = document.getElementById('card2Name').value;
            saveUserData(data);
            alert('Configurações salvas!');
            renderAll();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event?.currentTarget?.classList.add('active');
        }

        // ========== AUTENTICAÇÃO UI ==========
        function showError(msg) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }

        function initAuth() {
            const savedUser = auth.getCurrentUser();
            if (savedUser) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                renderAll();
            }
            
            document.getElementById('btnLogin').onclick = () => {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const result = auth.login(email, password);
                if (result.success) {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appScreen').classList.remove('hidden');
                    renderAll();
                } else {
                    showError(result.error);
                }
            };
            
            document.getElementById('showRegister').onclick = () => {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const result = auth.register(email, password);
                if (result.success) {
                    alert('Conta criada com sucesso! Faça login.');
                } else {
                    showError(result.error);
                }
            };
        }

        function handleLogout() {
            auth.logout();
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // EXPORTAR FUNÇÕES GLOBAIS
        window.switchTab = switchTab;
        window.handleAddTransaction = handleAddTransaction;
        window.handleAddGoal = handleAddGoal;
        window.handleUpdateGoal = handleUpdateGoal;
        window.deleteTransaction = deleteTransaction;
        window.deleteGoal = deleteGoal;
        window.saveConfig = saveConfig;
        window.handleLogout = handleLogout;

        // INICIALIZAR
        initAuth();
    </script>
</body>
</html>
