<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>PlanejaFlow | PF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <!-- Firebase SDKs - Versão compatível -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* VARIÁVEIS CSS PARA TEMAS */
        :root {
            --bg-gradient-start: #0a0f1e;
            --bg-gradient-end: #050810;
            --card-bg: rgba(20, 25, 45, 0.6);
            --card-border: rgba(139, 92, 246, 0.2);
            --card-border-hover: rgba(139, 92, 246, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec489a;
            --input-bg: rgba(15, 18, 35, 0.8);
            --input-border: rgba(139, 92, 246, 0.3);
            --input-text: #ffffff;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --hover-solid: #c084fc;
            --timeline-bg: rgba(30, 25, 75, 0.4);
            --goal-card-bg: rgba(20, 25, 45, 0.5);
            --stat-mini-bg: rgba(20, 25, 45, 0.5);
            --filter-chip-bg: rgba(139, 92, 246, 0.15);
            --badge-category-bg: rgba(139, 92, 246, 0.2);
        }
        
        /* TEMA CLARO */
        body.theme-light {
            --bg-gradient-start: #e2e8f0;
            --bg-gradient-end: #cbd5e1;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-border-hover: #8b5cf6;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --accent-primary: #6d28d9;
            --accent-secondary: #db2777;
            --input-bg: #f7fafc;
            --input-border: #e2e8f0;
            --input-text: #1a202c;
            --hover-solid: #6d28d9;
            --timeline-bg: #f7fafc;
            --goal-card-bg: #ffffff;
            --stat-mini-bg: #f7fafc;
            --filter-chip-bg: #e2e8f0;
            --badge-category-bg: #e9d5ff;
        }
        
        /* TEMA NEON */
        body.theme-neon {
            --bg-gradient-start: #0a0f1e;
            --bg-gradient-end: #000000;
            --card-bg: rgba(0, 0, 0, 0.8);
            --card-border: #00ff88;
            --card-border-hover: #00ff88;
            --text-primary: #00ff88;
            --text-secondary: #00cc66;
            --accent-primary: #00ff88;
            --accent-secondary: #00ff88;
            --input-bg: #111111;
            --input-border: #00ff88;
            --input-text: #00ff88;
            --hover-solid: #00ff88;
            --timeline-bg: rgba(0, 0, 0, 0.5);
            --goal-card-bg: rgba(0, 0, 0, 0.5);
            --stat-mini-bg: rgba(0, 0, 0, 0.5);
            --filter-chip-bg: rgba(0, 255, 136, 0.15);
            --badge-category-bg: rgba(0, 255, 136, 0.2);
        }
        
        body {
            background: radial-gradient(circle at 10% 20%, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Inter', sans-serif;
            padding-bottom: 90px;
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
        }
        
        body.compact .card { padding: 12px; margin-bottom: 10px; }
        body.compact .goal-card { padding: 10px; margin-bottom: 10px; }
        body.no-animation * { animation: none !important; transition: none !important; }
        body.no-glow button::before { display: none; }
        body.no-glow button:hover { transform: none; box-shadow: none; }
        
        .container { max-width: 520px; margin: 0 auto; padding: 20px 18px; position: relative; z-index: 2; }
        
        /* TELA DE LOGIN */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 24px;
            border: 1px solid var(--card-border);
            width: 100%;
            max-width: 380px;
        }
        .login-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }
        .login-error {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid #f87171;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            color: #f87171;
            text-align: center;
        }
        .login-success {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid #4ade80;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            color: #4ade80;
            text-align: center;
        }
        .login-divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--card-border);
        }
        .login-divider::before { left: 0; }
        .login-divider::after { right: 0; }
        .login-divider span {
            background: var(--card-bg);
            padding: 0 10px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .login-links {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 0.7rem;
        }
        .login-links span {
            color: var(--accent-primary);
            cursor: pointer;
            text-decoration: underline;
        }
        .hidden { display: none !important; }
        
        /* DASHBOARD PROFISSIONAL */
        .app-header {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid var(--card-border);
        }
        
        .period-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid var(--card-border);
        }
        
        .balance-card {
            background: linear-gradient(135deg, #1a1f3a, #0f1228);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        body.theme-light .balance-card {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            border: 1px solid #8b5cf6;
        }
        body.theme-neon .balance-card {
            background: linear-gradient(135deg, #0a0f1e, #000000);
            border: 1px solid #00ff88;
        }
        
        .balance-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            border-radius: 50%;
        }
        
        .avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5);
            color: white;
        }
        
        .user-info h2 {
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .user-info h2:hover {
            background: var(--hover-solid);
            color: white;
        }
        
        .user-info .question-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
        }
        
        .main-amount {
            font-size: 2rem;
            font-weight: 800;
            margin: 12px 0;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .grid-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 18px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            padding-top: 16px;
        }
        .info-item {
            font-size: 0.65rem;
            opacity: 0.9;
            text-transform: uppercase;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .info-item b {
            font-size: 1rem;
            display: block;
            margin-top: 4px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .debt-info {
            font-size: 0.7rem;
            margin-top: 4px;
            opacity: 0.8;
            color: var(--danger);
        }
        
        /* TIMELINE PROFISSIONAL */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid var(--card-border);
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: var(--card-border-hover);
        }
        
        h3 {
            font-size: 0.75rem;
            letter-spacing: 0.8px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-primary);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid var(--accent-primary);
            padding-left: 12px;
        }
        
        .timeline-container {
            position: relative;
            padding-left: 30px;
        }
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .timeline-icon {
            position: absolute;
            left: -30px;
            top: 0;
            width: 36px;
            height: 36px;
            background: var(--card-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(139, 92, 246, 0.4);
            z-index: 1;
        }
        .timeline-icon.income {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
            border-color: var(--success);
        }
        .timeline-icon.expense {
            background: rgba(248, 113, 113, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }
        .timeline-content {
            flex: 1;
            background: var(--timeline-bg);
            border-radius: 20px;
            padding: 12px 16px;
            transition: all 0.2s;
            border: 1px solid var(--card-border);
        }
        .timeline-content:hover {
            background: rgba(139, 92, 246, 0.15);
            transform: translateX(4px);
            border-color: var(--card-border-hover);
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .timeline-desc {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .timeline-value {
            font-weight: 800;
            font-size: 0.9rem;
        }
        .timeline-value.income {
            color: var(--success);
        }
        .timeline-value.expense {
            color: var(--danger);
        }
        .timeline-details {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .timeline-category {
            font-size: 0.65rem;
            background: rgba(139, 92, 246, 0.1);
            padding: 3px 10px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }
        .timeline-method {
            font-size: 0.65rem;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(139, 92, 246, 0.05);
            padding: 3px 10px;
            border-radius: 30px;
        }
        .timeline-date {
            font-size: 0.6rem;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .empty-timeline {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            background: var(--timeline-bg);
            border-radius: 24px;
        }
        
        /* EXTRATO PROFISSIONAL */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--card-border);
        }
        .item-main {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }
        .cat-icon {
            width: 44px;
            height: 44px;
            background: var(--badge-category-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .badge-category {
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--badge-category-bg);
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            color: var(--accent-primary);
        }
        
        /* INVESTIMENTOS */
        .investment-tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(139, 92, 246, 0.15);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .inv-tab {
            flex: 1;
            text-align: center;
            padding: 10px 8px;
            border-radius: 32px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .inv-tab.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        .inv-panel { display: none; }
        .inv-panel.active { display: block; }
        
        .investment-option-card {
            background: var(--goal-card-bg);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            cursor: pointer;
        }
        .investment-option-card .title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .investment-option-card .desc {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            background: var(--timeline-bg);
            border-radius: 24px;
        }
        
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 20px auto;
        }
        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .investment-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--card-border);
        }
        .investment-list-item .name {
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        .investment-list-item .value {
            font-weight: 700;
            color: var(--accent-primary);
        }
        .section-title {
            font-weight: 700;
            font-size: 0.8rem;
            margin: 16px 0 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-primary);
            color: var(--accent-primary);
        }
        
        /* METAS */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-chip {
            background: var(--filter-chip-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .filter-chip.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-color: transparent;
        }
        
        .stats-mini-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-mini {
            background: var(--stat-mini-bg);
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--card-border);
        }
        .stat-mini .value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent-primary);
        }
        .stat-mini .label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .goal-card {
            background: var(--goal-card-bg);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--card-border);
        }
        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .goal-title {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .goal-badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--badge-category-bg);
            color: var(--accent-primary);
        }
        .goal-image {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            object-fit: cover;
            background: rgba(139, 92, 246, 0.2);
            cursor: pointer;
        }
        
        .progress-container { margin: 12px 0; }
        .progress-bar-custom {
            background: rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill-custom {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            height: 100%;
            border-radius: 20px;
            transition: width 0.6s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .milestones {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            padding: 8px 0;
            border-top: 1px solid var(--card-border);
            border-bottom: 1px solid var(--card-border);
        }
        .milestone {
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-secondary);
        }
        .milestone.reached { color: var(--success); }
        
        .goal-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 16px 0;
        }
        .goal-info-item {
            background: var(--timeline-bg);
            border-radius: 12px;
            padding: 10px 8px;
            text-align: center;
            border: 1px solid var(--card-border);
        }
        .goal-info-item .label {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }
        .goal-info-item .value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .suggestion-box {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            padding: 10px;
            margin: 12px 0;
            font-size: 0.7rem;
            border-left: 3px solid var(--accent-primary);
            color: var(--text-secondary);
        }
        .achievements {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .achievement {
            font-size: 0.6rem;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }
        
        .goal-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .goal-actions button {
            width: auto;
            padding: 8px 12px;
            font-size: 0.7rem;
            margin: 0;
        }
        
        /* IMPORTAÇÃO PDF */

<body>
    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-title">PlanejaFlow</div>
            <div class="login-subtitle">Gerencie suas finanças com inteligência</div>
            
            <div id="loginError" class="login-error hidden"></div>
            <div id="loginSuccess" class="login-success hidden"></div>
            
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Seu e-mail">
                <input type="password" id="loginPassword" placeholder="Sua senha">
                <button id="btnLogin">Entrar</button>
                <div class="login-links">
                    <span onclick="showRegister()">Criar conta</span>
                    <span onclick="showResetPassword()">Esqueci a senha</span>
                </div>
                <div class="login-divider"><span>ou</span></div>
                <button id="btnMagicLink" class="btn-secondary">📧 Enviar link mágico</button>
            </div>
            
            <div id="registerForm" class="hidden">
                <input type="email" id="registerEmail" placeholder="Seu e-mail">
                <input type="password" id="registerPassword" placeholder="Sua senha (mínimo 6 caracteres)">
                <button id="btnRegister">Criar conta</button>
                <div class="login-links">
                    <span onclick="showLogin()">Voltar para o login</span>
                </div>
            </div>
            
            <div id="resetForm" class="hidden">
                <input type="email" id="resetEmail" placeholder="Seu e-mail">
                <button id="btnReset">Enviar email de recuperação</button>
                <div class="login-links">
                    <span onclick="showLogin()">Voltar para o login</span>
                </div>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="appScreen" class="hidden">
        <div class="container">
            <div id="tab-home" class="tab-content active"></div>
            <div id="tab-diamond" class="tab-content"><div id="dynamic-tips-card" class="card"></div></div>
            <div id="tab-extrato" class="tab-content"><div id="extrato-content"></div></div>
            <div id="tab-invest" class="tab-content"><div id="invest-content"></div></div>
            <div id="tab-metas" class="tab-content"><div id="metas-content"></div></div>
            <div id="tab-config" class="tab-content"><div id="config-content"></div></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('tab-home')"><i class="fas fa-home"></i>Início</div>
            <div class="nav-item" id="nav-vision" onclick="switchTab('tab-diamond')"><i class="fas fa-gem"></i>Visão</div>
            <div class="nav-item" onclick="switchTab('tab-extrato')"><i class="fas fa-receipt"></i>Extrato</div>
            <div class="nav-item" onclick="switchTab('tab-invest')"><i class="fas fa-chart-line"></i>Investir</div>
            <div class="nav-item" onclick="switchTab('tab-metas')"><i class="fas fa-flag-checkered"></i>Metas</div>
            <div class="nav-item" onclick="switchTab('tab-config')"><i class="fas fa-sliders-h"></i>Ajustes</div>
        </nav>
    </div>

    <!-- Modal para visualizar foto -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="Foto do sonho">
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIGURAÇÃO ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCEgMpqdPrMzTqdASDi_dTgCRJulpH-JiE",
            authDomain: "planejaflow.firebaseapp.com",
            projectId: "planejaflow",
            storageBucket: "planejaflow.firebasestorage.app",
            messagingSenderId: "752976520583",
            appId: "1:752976520583:web:292a0172ba6f1a0fa19f22",
            measurementId: "G-VMSSC0QPS7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db_firestore = firebase.firestore();
        
        console.log("Firebase inicializado com sucesso!");
        
        // ==================== ESTADO DO APP ====================
        let currentUser = null;
        let currentYear = 2025, currentMonth = 3;
        let selectedYear = 2025, selectedMonth = 3;
        let currentInvTab = "renda-fixa";
        let portfolioChart = null;
        let currentGoalFilter = "all";
        let goalsDistributionChart = null;
        
        // Dados do usuário no Firestore
        let userData = {
            name: null,
            quote: "📊 Planeje o fluxo, colha os resultados",
            card1Name: "Visa Platinum",
            card2Name: "Mastercard Black",
            customCategories: [],
            months: {},
            actionProgress: { positive: {}, negative: {} },
            theme: "dark",
            fontSize: "medium",
            animations: true,
            glowEffect: true,
            compactMode: false
        };
        
        // ==================== FUNÇÕES FIRESTORE ====================
        async function loadUserDataFromFirestore() {
            if (!currentUser) return;
            
            const docRef = db_firestore.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            
            if (doc.exists) {
                userData = doc.data();
            } else {
                // Criar documento padrão para novo usuário
                userData = {
                    name: currentUser.email ? currentUser.email.split('@')[0] : "Usuário",
                    quote: "📊 Planeje o fluxo, colha os resultados",
                    card1Name: "Visa Platinum",
                    card2Name: "Mastercard Black",
                    customCategories: [],
                    months: {},
                    actionProgress: { positive: {}, negative: {} },
                    theme: "dark",
                    fontSize: "medium",
                    animations: true,
                    glowEffect: true,
                    compactMode: false
                };
                await docRef.set(userData);
            }
            
            if (!userData.months) userData.months = {};
            if (!userData.customCategories) userData.customCategories = [];
            if (!userData.actionProgress) userData.actionProgress = { positive: {}, negative: {} };
            
            applyStyleSettings();
            renderAll();
        }
        
        async function saveUserDataToFirestore() {
            if (!currentUser) return;
            const docRef = db_firestore.collection('users').doc(currentUser.uid);
            await docRef.set(userData);
        }
        
        function saveGlobal() {
            saveUserDataToFirestore();
            renderAll();
            applyStyleSettings();
        }
        
        // ==================== AUTENTICAÇÃO ====================
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('loginSuccess').classList.add('hidden');
        }
        
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('loginSuccess').classList.add('hidden');
        }
        
        function showResetPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('loginSuccess').classList.add('hidden');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('loginSuccess');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');
            setTimeout(() => successDiv.classList.add('hidden'), 5000);
        }
        
        // Login
        document.getElementById('btnLogin')?.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showError('Preencha e-mail e senha');
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                showError(error.message);
            }
        });
        
        // Criar conta
        document.getElementById('btnRegister')?.addEventListener('click', async () => {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            if (!email || !password) {
                showError('Preencha e-mail e senha');
                return;
            }
            if (password.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres');
                return;
            }
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                showSuccess('Conta criada com sucesso!');
            } catch (error) {
                showError(error.message);
            }
        });
        
        // Recuperar senha
        document.getElementById('btnReset')?.addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value;
            if (!email) {
                showError('Digite seu e-mail');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showSuccess('Email de recuperação enviado! Verifique sua caixa de entrada.');
                showLogin();
            } catch (error) {
                showError(error.message);
            }
        });
        
        // Link mágico
        document.getElementById('btnMagicLink')?.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                showError('Digite seu e-mail primeiro');
                return;
            }
            try {
                const actionCodeSettings = {
                    url: window.location.href,
                    handleCodeInApp: true
                };
                await auth.sendSignInLinkToEmail(email, actionCodeSettings);
                localStorage.setItem('emailForSignIn', email);
                showSuccess('Link mágico enviado! Verifique seu e-mail.');
            } catch (error) {
                showError(error.message);
            }
        });
        
        // Verificar link mágico
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = localStorage.getItem('emailForSignIn');
            if (!email) {
                email = prompt('Digite seu e-mail para confirmar o login');
            }
            if (email) {
                auth.signInWithEmailLink(email, window.location.href)
                    .then(() => localStorage.removeItem('emailForSignIn'))
                    .catch(error => showError(error.message));
            }
        }
        
        // Monitorar autenticação
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserDataFromFirestore();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
            } else {
                currentUser = null;
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
                showLogin();
            }
        });
        
        function logout() { auth.signOut(); }
        
        // ==================== FUNÇÕES DE APOIO ====================
        function applyStyleSettings() {
            document.body.classList.remove('theme-light', 'theme-neon', 'compact', 'no-animation', 'no-glow');
            if (userData.theme === 'light') document.body.classList.add('theme-light');
            if (userData.theme === 'neon') document.body.classList.add('theme-neon');
            if (userData.compactMode) document.body.classList.add('compact');
            if (!userData.animations) document.body.classList.add('no-animation');
            if (!userData.glowEffect) document.body.classList.add('no-glow');
            let fontSize = userData.fontSize || 'medium';
            if (fontSize === 'small') document.body.style.fontSize = '12px';
            else if (fontSize === 'large') document.body.style.fontSize = '18px';
            else document.body.style.fontSize = '';
        }
        
        function saveStyleSetting(key, value) { userData[key] = value; saveGlobal(); }
        
        function getMonthKey() { return `${currentYear}-${currentMonth}`; }
        function getMonthData() { 
            let key = getMonthKey(); 
            if (!userData.months[key]) userData.months[key] = { transactions: [], investments: [], goals: [] }; 
            return userData.months[key]; 
        }
        
        function getMonthDisplay() { 
            const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']; 
            return `${months[currentMonth]} ${currentYear}`; 
        }
        
        function confirmPeriod() { currentYear = selectedYear; currentMonth = selectedMonth; renderAll(); }
        function askUserName() { let n = prompt("Como gostaria de ser chamado?", userData.name || "Planejador"); if(n?.trim()) { userData.name = n.trim(); saveGlobal(); } }
        function saveQuote() { let q = document.getElementById('quote-input')?.value; if(q) userData.quote = q; saveGlobal(); }
        
        const BASE_CATEGORIES = [
            { name: "💼 Salário", icon: "fas fa-briefcase" }, { name: "🚀 Renda Extra", icon: "fas fa-rocket" },
            { name: "📈 Dividendos", icon: "fas fa-chart-simple" }, { name: "🛒 Mercado", icon: "fas fa-cart-shopping" },
            { name: "🍽️ Restaurante", icon: "fas fa-utensils" }, { name: "🏠 Moradia", icon: "fas fa-home" },
            { name: "⚡ Contas", icon: "fas fa-bolt" }, { name: "🚗 Transporte", icon: "fas fa-car" },
            { name: "🎓 Educação", icon: "fas fa-graduation-cap" }, { name: "❤️ Saúde", icon: "fas fa-heartbeat" },
            { name: "🎉 Lazer", icon: "fas fa-plane" }, { name: "🏦 Investimentos", icon: "fas fa-chart-line" }
        ];
        
        function getAllCategories() { return [...BASE_CATEGORIES, ...(userData.customCategories || [])]; }
        function getCategoryIcon(categoryName) {
            const allCats = getAllCategories();
            const found = allCats.find(c => c.name === categoryName);
            return found ? found.icon : "fas fa-receipt";
        }

        // ==================== IMPORTAÇÃO PDF (OPÇÃO C) ====================
        let pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        let importedTransactions = [];
        
        async function parsePDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }
            
            return extractTransactionsFromText(fullText);
        }
        
        function extractTransactionsFromText(text) {
            const transactions = [];
            // Padrão comum em extratos: DATA DESCRIÇÃO VALOR
            const lines = text.split('\n');
            
            for (let line of lines) {
                // Tentar encontrar padrão de data (DD/MM ou DD/MM/AAAA)
                const dateMatch = line.match(/(\d{2}\/\d{2}(?:\/\d{4})?)/);
                // Tentar encontrar valor (R$ 123,45 ou 123,45)
                const valueMatch = line.match(/R?\$?\s*(\d{1,3}(?:\.\d{3})*,\d{2})/);
                // Tentar encontrar descrição (texto entre data e valor)
                
                if (dateMatch && valueMatch) {
                    let description = line
                        .replace(dateMatch[0], '')
                        .replace(valueMatch[0], '')
                        .trim();
                    
                    let valueStr = valueMatch[1].replace(/\./g, '').replace(',', '.');
                    let value = parseFloat(valueStr);
                    let type = value > 0 ? 'in' : 'out';
                    
                    if (description.toLowerCase().includes('pix') || description.toLowerCase().includes('ted')) {
                        description = description.toUpperCase();
                    }
                    
                    transactions.push({
                        date: dateMatch[0],
                        description: description.substring(0, 50),
                        value: Math.abs(value),
                        type: type,
                        category: detectCategory(description),
                        method: detectMethod(description)
                    });
                }
            }
            
            return transactions;
        }
        
        function detectCategory(description) {
            const descLower = description.toLowerCase();
            if (descLower.includes('salario') || descLower.includes('salário')) return '💼 Salário';
            if (descLower.includes('mercado') || descLower.includes('supermercado')) return '🛒 Mercado';
            if (descLower.includes('restaurante') || descLower.includes('ifood')) return '🍽️ Restaurante';
            if (descLower.includes('luz') || descLower.includes('energia')) return '⚡ Contas';
            if (descLower.includes('agua') || descLower.includes('água')) return '⚡ Contas';
            if (descLower.includes('internet')) return '⚡ Contas';
            if (descLower.includes('uber') || descLower.includes('taxi')) return '🚗 Transporte';
            if (descLower.includes('faculdade') || descLower.includes('curso')) return '🎓 Educação';
            if (descLower.includes('farmacia') || descLower.includes('saude')) return '❤️ Saúde';
            if (descLower.includes('cinema') || descLower.includes('viagem')) return '🎉 Lazer';
            if (descLower.includes('dividendo')) return '📈 Dividendos';
            if (descLower.includes('cdb') || descLower.includes('tesouro')) return '🏦 Investimentos';
            return '📝 Outros';
        }
        
        function detectMethod(description) {
            const descLower = description.toLowerCase();
            if (descLower.includes('pix')) return 'money';
            if (descLower.includes('credito') || descLower.includes('cartão')) return 'card1';
            return 'money';
        }

        function simulateCompound() {
            let initial = parseFloat(document.getElementById('s-val')?.value) || 0;
            let monthly = parseFloat(document.getElementById('s-mensal')?.value) || 0;
            let months = parseInt(document.getElementById('s-mes')?.value);
            let rate = parseFloat(document.getElementById('s-taxa')?.value);
            if(!months || months<=0) { let res = document.getElementById('s-res'); if(res) res.style.display='none'; return; }
            let total = initial;
            for(let i=0;i<months;i++) total = (total + monthly)*(1+rate);
            let invested = initial+(monthly*months);
            let resDiv = document.getElementById('s-res');
            if(resDiv) { resDiv.style.display='block'; document.getElementById('res-total').innerHTML = `R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`; document.getElementById('res-juros').innerHTML = `Juros: R$ ${(total-invested).toLocaleString('pt-BR')}`; }
        }

        function getGoalType(goal) {
            if (goal.target <= 10000) return "short";
            if (goal.target <= 50000) return "medium";
            if (goal.name.toLowerCase().includes("educa") || goal.name.toLowerCase().includes("curso")) return "education";
            if (goal.name.toLowerCase().includes("viagem") || goal.name.toLowerCase().includes("sonho")) return "dream";
            return "long";
        }
        
        function getGoalTypeLabel(type) {
            const types = { short: "Curto Prazo", medium: "Médio Prazo", long: "Longo Prazo", education: "Educação", dream: "Sonhos" };
            return types[type] || "Longo Prazo";
        }
        
        function getGoalIcon(type) {
            const icons = { short: "⏱️", medium: "📊", long: "🏡", education: "📚", dream: "✨" };
            return icons[type] || "🎯";
        }
        
        function calculateProgress(goal) {
            let current = goal.currentAmount || 0;
            let percent = (current / goal.target) * 100;
            return Math.min(percent, 100);
        }
        
        function calculateMilestones(goal) {
            let current = goal.currentAmount || 0;
            let target = goal.target;
            return { m25: current >= target * 0.25, m50: current >= target * 0.5, m75: current >= target * 0.75, m100: current >= target };
        }
        
        function getGoalBadge(goal) {
            let percent = calculateProgress(goal);
            if (percent >= 100) return { name: "🏆 CONCLUÍDA", color: "#4ade80", points: 1000 };
            if (percent >= 75) return { name: "🥇 OURO", color: "#fbbf24", points: 500 };
            if (percent >= 50) return { name: "🥈 PRATA", color: "#c0c0c0", points: 250 };
            if (percent >= 25) return { name: "🥉 BRONZE", color: "#cd7f32", points: 100 };
            return { name: "🌱 INICIANTE", color: "#8b5cf6", points: 0 };
        }
        
        function calculateSuggestion(goal) {
            let current = goal.currentAmount || 0;
            let target = goal.target;
            let remaining = target - current;
            let currentMonthly = goal.monthly;
            let remainingMonths = goal.months;
            if (remaining <= 0) return null;
            let neededMonthly = remaining / remainingMonths;
            if (currentMonthly >= neededMonthly) return null;
            let extraNeeded = neededMonthly - currentMonthly;
            let newMonths = Math.ceil(remaining / (currentMonthly + 500));
            return { extraNeeded: Math.ceil(extraNeeded), newMonths, accelerator: 500 };
        }
        
        function getRecentAchievements(goal) {
            let achievements = [];
            let percent = calculateProgress(goal);
            if (percent >= 25 && !goal._achieved25) { goal._achieved25 = true; achievements.push("🎯 25% da meta atingida!"); }
            if (percent >= 50 && !goal._achieved50) { goal._achieved50 = true; achievements.push("🎯 50% da meta atingida!"); }
            if (percent >= 75 && !goal._achieved75) { goal._achieved75 = true; achievements.push("🎯 75% da meta atingida!"); }
            if (percent >= 100 && !goal._achieved100) { goal._achieved100 = true; achievements.push("🏆 META CONCLUÍDA! Parabéns!"); }
            return achievements;
        }
        
        function getNotifications(goals) {
            let notifications = [];
            goals.forEach(goal => {
                let percent = calculateProgress(goal);
                if (percent >= 90 && percent < 100) notifications.push({ icon: "🎉", text: `"${goal.name}" está a ${Math.round(100-percent)}% de ser concluída!` });
            });
            return notifications.slice(0, 3);
        }

        function addGoalWithImage() {
            let name = document.getElementById('new-goal-name')?.value.trim();
            let target = parseFloat(document.getElementById('new-goal-target')?.value);
            let monthly = parseFloat(document.getElementById('new-goal-monthly')?.value);
            let current = parseFloat(document.getElementById('new-goal-current')?.value) || 0;
            let type = document.getElementById('new-goal-type')?.value;
            let imageInput = document.getElementById('new-goal-image-input');
            
            if(!name || isNaN(target) || target<=0) return alert("Preencha o nome e valor da meta");
            if(isNaN(monthly) || monthly<=0) return alert("Informe o aporte mensal");
            
            let saldo = current, meses = 0;
            let taxa = 0.01;
            while(saldo < target && meses < 600) { saldo = (saldo + monthly) * (1 + taxa); meses++; }
            
            let newGoal = { id: Date.now(), name, target, monthly, months: meses, currentAmount: current, type: type };
            
            if (imageInput.files && imageInput.files[0]) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    newGoal.image = event.target.result;
                    let monthData = getMonthData();
                    monthData.goals.push(newGoal);
                    document.getElementById('new-goal-name').value = "";
                    document.getElementById('new-goal-target').value = "";
                    document.getElementById('new-goal-monthly').value = "";
                    document.getElementById('new-goal-current').value = "0";
                    document.getElementById('new-goal-image-input').value = "";
                    document.getElementById('new-goal-preview').src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎯%3C/text%3E%3C/svg%3E";
                    saveGlobal();
                };
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                let monthData = getMonthData();
                monthData.goals.push(newGoal);
                document.getElementById('new-goal-name').value = "";
                document.getElementById('new-goal-target').value = "";
                document.getElementById('new-goal-monthly').value = "";
                document.getElementById('new-goal-current').value = "0";
                saveGlobal();
            }
        }

                </div>
                <div class="card"><h3>⚙️ Personalização de Cartões</h3>
                    <input type="text" id="c1-n" placeholder="Nome do Cartão 1" value="${userData.card1Name}">
                    <input type="text" id="c2-n" placeholder="Nome do Cartão 2" value="${userData.card2Name}">
                    <button class="config-save-btn" onclick="saveCards()"><i class="fas fa-save"></i> Salvar nomes dos cartões</button>
                    <small style="display:block; margin-top:8px; color:var(--text-secondary);">✏️ Edite os nomes e clique em "Salvar" para confirmar</small>
                </div>
                <div class="card"><h3>🏷️ Categorias Personalizadas</h3>
                    <div style="display:flex; gap:8px;"><input type="text" id="new-cat-name" placeholder="Nova categoria" style="flex:2;"><button onclick="openIconSelector()" style="background:rgba(139,92,246,0.2); color:var(--accent-primary); width:auto;">Escolher ícone</button></div>
                    <div id="icon-selector-panel" style="display:none; margin-top:12px;"><div class="icon-selector" id="icon-grid"></div><button onclick="confirmAddCategory()" style="margin-top:8px;">Adicionar categoria</button></div>
                    <div id="custom-categories-list" style="margin-top:16px;">${custom.length===0?'<small style="color:var(--text-secondary);">Nenhuma categoria personalizada</small>':custom.map(c=>`<div class="category-item"><span><i class="${c.icon}"></i> ${c.name}</span><button class="btn-del" onclick="deleteCustomCategory('${c.name.replace(/'/g,"\\'")}')">x</button></div>`).join('')}</div>
                </div>
                <div class="card"><h3>📝 Frase de impacto</h3>
                    <input type="text" id="quote-input" value="${userData.quote || ''}" onblur="saveQuote()">
                    <small style="display:block; margin-top:6px; color:var(--text-secondary);">Clique fora do campo para salvar</small>
                </div>
                <div class="card">
                    <button id="logoutButton" class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair da conta</button>
                </div>
            `;
            document.getElementById('config-content').innerHTML = html;
        }
        
        // ==================== DIAMOND/VISÃO ====================
        const POSITIVE_ACTIONS = [
            "✅ Aumentei meus aportes mensais em 5%",
            "📊 Revisei meus investimentos e diversifiquei a carteira",
            "💰 Mantenho reserva de emergência de 6 meses",
            "📚 Investi em educação financeira (livros/cursos)",
            "🎯 Defini metas claras para os próximos 12 meses",
            "🔄 Automatizei meus investimentos mensais",
            "📈 Acompanhei meus indicadores financeiros"
        ];
        
        const NEGATIVE_ACTIONS = [
            "📝 Listei todas as minhas dívidas com juros",
            "✂️ Cortei despesas não essenciais do mês",
            "🤝 Negociei prazos e juros com credores",
            "💪 Quitei a dívida mais cara (método avalanche)",
            "📊 Criei um orçamento realista de recuperação",
            "🚀 Busquei fontes extras de renda",
            "🧠 Estudei sobre educação financeira para recomeçar"
        ];
        
        function toggleAction(key, index, isPositive) {
            const category = isPositive ? 'positive' : 'negative';
            if (!userData.actionProgress[category][key]) userData.actionProgress[category][key] = [];
            const idx = userData.actionProgress[category][key].indexOf(index);
            if (idx === -1) userData.actionProgress[category][key].push(index);
            else userData.actionProgress[category][key].splice(idx, 1);
            saveGlobal();
        }
        
        function getProgress(key, isPositive) {
            const category = isPositive ? 'positive' : 'negative';
            const actions = isPositive ? POSITIVE_ACTIONS : NEGATIVE_ACTIONS;
            const completed = userData.actionProgress[category][key] || [];
            return { completed: completed.length, total: actions.length };
        }
        
        function renderDiamond() {
            let monthData = getMonthData();
            let transactions = monthData.transactions || [];
            let investments = monthData.investments || [];
            let cashBalance = 0, card1Balance = 0, card2Balance = 0;
            transactions.forEach(t => {
                let valueOp = t.type === 'in' ? t.value : -t.value;
                if (t.method === 'money') cashBalance += valueOp;
                else if (t.method === 'card1') card1Balance += valueOp;
                else if (t.method === 'card2') card2Balance += valueOp;
            });
            let totalDebt = 0;
            if (card1Balance < 0) totalDebt += Math.abs(card1Balance);
            if (card2Balance < 0) totalDebt += Math.abs(card2Balance);
            let net = cashBalance + investments.reduce((s,i)=>s+i.amount,0) - totalDebt;
            
            let isPositive = net >= 0;
            const actions = isPositive ? POSITIVE_ACTIONS : NEGATIVE_ACTIONS;
            const key = getMonthKey();
            const { completed, total } = getProgress(key, isPositive);
            const percent = total > 0 ? (completed / total) * 100 : 0;
            
            let html = `<div style="text-align:center;margin-bottom:20px;"><i class="${isPositive ? 'fas fa-gem' : 'fas fa-life-ring'}" style="font-size:2rem;color:${isPositive?'#4ade80':'#f87171'}"></i><h2 style="font-size:1.2rem;margin-top:8px;background:linear-gradient(135deg,#fff,var(--accent-primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${isPositive ? '💎 Jornada da Prosperidade' : '🆘 Plano de Recuperação'}</h2><p style="font-size:0.75rem;color:var(--text-secondary);">${isPositive ? 'Continue no caminho da liberdade financeira!' : 'Com planejamento, você pode reverter esta situação.'}</p></div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
            <div class="progress-text">${completed} de ${total} ações concluídas</div>
            <div class="action-list">`;
            
            actions.forEach((action, idx) => {
                const isCompleted = userData.actionProgress[isPositive ? 'positive' : 'negative'][key]?.includes(idx) || false;
                html += `<div class="action-item ${isCompleted ? 'completed' : ''}" onclick="toggleAction('${key}', ${idx}, ${isPositive})">
                            <input type="checkbox" ${isCompleted ? 'checked' : ''} onclick="event.stopPropagation(); toggleAction('${key}', ${idx}, ${isPositive})">
                            <span class="action-text">${action}</span>
                        </div>`;
            });
            html += `</div>`;
            document.getElementById('dynamic-tips-card').innerHTML = html;
            
            const navVision = document.getElementById('nav-vision');
            if (navVision) navVision.innerHTML = isPositive ? '<i class="fas fa-gem"></i>Visão' : '<i class="fas fa-life-ring"></i>Recuperação';
        }
        
        // ==================== RENDERIZAÇÃO PRINCIPAL ====================
        function renderAll() {
            if (!currentUser) return;
            renderHome();
            renderExtrato();
            renderInvest();
            renderMetas();
            renderConfig();
            renderDiamond();
        }
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(event?.currentTarget) event.currentTarget.classList.add('active');
            if(tabId === 'tab-invest') setTimeout(() => { simulateCompound(); updatePortfolioChart(); }, 100);
            if(tabId === 'tab-diamond') renderDiamond();
            if(tabId === 'tab-metas') renderMetas();
        }
        
        // Preview da imagem
        document.addEventListener('DOMContentLoaded', function() {
            let imageInput = document.getElementById('new-goal-image-input');
            if (imageInput) {
                imageInput.addEventListener('change', function(e) {
                    let file = e.target.files[0];
                    if (file) {
                        let reader = new FileReader();
                        reader.onload = function(event) {
                            let preview = document.getElementById('new-goal-preview');
                            if (preview) preview.src = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
        });
        
        // Exportar funções globais
        window.switchTab = switchTab;
        window.addInvestmentByType = addInvestmentByType;
        window.addTransaction = addTransaction;
        window.deleteItem = deleteItem;
        window.confirmPeriod = confirmPeriod;
        window.toggleAction = toggleAction;
        window.askUserName = askUserName;
        window.saveQuote = saveQuote;
        window.saveCards = saveCards;
        window.openIconSelector = openIconSelector;
        window.selectIcon = selectIcon;
        window.confirmAddCategory = confirmAddCategory;
        window.deleteCustomCategory = deleteCustomCategory;
        window.setGoalFilter = setGoalFilter;
        window.addGoalWithImage = addGoalWithImage;
        window.triggerImageUpload = triggerImageUpload;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.updateGoalAmount = updateGoalAmount;
        window.saveStyleSetting = saveStyleSetting;
        window.logout = logout;
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.showResetPassword = showResetPassword;
        window.confirmImport = confirmImport;
    </script>
</body>
</html>
